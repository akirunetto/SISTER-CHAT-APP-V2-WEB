<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Retro Web Chat 98</title>
    
    <!-- Google Fonts: VT323 for Retro Pixel Aesthetic -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        pixel: ['"VT323"', 'monospace']
                    },
                    colors: {
                        theme: {
                            bg: 'var(--bg-color)',
                            titlebar: 'var(--titlebar-color)',
                            titletext: 'var(--titletext-color)',
                            bubbleMine: 'var(--bubble-mine-bg)',
                            bubbleOther: 'var(--bubble-other-bg)',
                        }
                    }
                }
            }
        }
    </script>
    <style>
        :root {
            /* Pink Default */
            --bg-color: #fbcfe8; 
            --titlebar-color: #db2777;
            --titletext-color: #ffffff;
            --bubble-mine-bg: #fdf2f8;
            --bubble-other-bg: #ffffff;
            
            /* Windows Core */
            --win-border-light: #ffffff;
            --win-border-dark: #838383;
            --win-border-darker: #000000;
            --win-surface: #c0c0c0;
            --win-text: #000000;
        }

        [data-theme="green"] {
            --bg-color: #bbf7d0;
            --titlebar-color: #16a34a;
            --bubble-mine-bg: #f0fdf4;
        }

        [data-theme="blue"] {
            --bg-color: #bfdbfe;
            --titlebar-color: #2563eb;
            --bubble-mine-bg: #eff6ff;
        }

        /* Dark Mode Shifts */
        html.dark {
            --win-surface: #2d2d2d;
            --win-text: #ffffff;
            --win-border-light: #555555;
            --win-border-dark: #1a1a1a;
            --bubble-other-bg: #3f3f3f;
        }

        html.dark[data-theme="pink"] {
            --bg-color: #4a192c;
            --titlebar-color: #831843;
            --titletext-color: #fbcfe8;
            --bubble-mine-bg: #702642;
        }

        html.dark[data-theme="green"] {
            --bg-color: #143320;
            --titlebar-color: #14532d;
            --titletext-color: #bbf7d0;
            --bubble-mine-bg: #1c4a2e;
        }

        html.dark[data-theme="blue"] {
            --bg-color: #172a4f;
            --titlebar-color: #1e3a8a;
            --titletext-color: #bfdbfe;
            --bubble-mine-bg: #213c75;
        }

        body {
            background-color: var(--bg-color);
            color: var(--win-text);
            transition: background-color 0.3s;
        }

        /* Retro Windows 9x Utilities */
        .win-border {
            border: 2px solid;
            border-top-color: var(--win-border-light);
            border-left-color: var(--win-border-light);
            border-bottom-color: var(--win-border-darker);
            border-right-color: var(--win-border-darker);
            background-color: var(--win-surface);
        }
        
        .win-border-inner {
            border: 2px solid;
            border-top-color: var(--win-border-dark);
            border-left-color: var(--win-border-dark);
            border-bottom-color: var(--win-border-light);
            border-right-color: var(--win-border-light);
            background: #ffffff;
        }
        html.dark .win-border-inner { background: #121212; color: #fff; }

        .win-btn {
            border: 2px solid;
            border-top-color: var(--win-border-light);
            border-left-color: var(--win-border-light);
            border-bottom-color: var(--win-border-darker);
            border-right-color: var(--win-border-darker);
            background-color: var(--win-surface);
            color: var(--win-text);
        }
        .win-btn:active {
            border-top-color: var(--win-border-darker);
            border-left-color: var(--win-border-darker);
            border-bottom-color: var(--win-border-light);
            border-right-color: var(--win-border-light);
            padding-top: 2px;
            padding-left: 2px;
            padding-bottom: 0;
            padding-right: 0;
        }

        /* Custom Retro Scrollbar */
        #chat-box::-webkit-scrollbar { width: 18px; }
        #chat-box::-webkit-scrollbar-track { background: var(--win-surface); border-left: 1px solid var(--win-border-darker); }
        #chat-box::-webkit-scrollbar-thumb { 
            background: var(--win-surface);
            border: 2px solid;
            border-top-color: var(--win-border-light);
            border-left-color: var(--win-border-light);
            border-bottom-color: var(--win-border-darker);
            border-right-color: var(--win-border-darker);
        }
        
        .title-bar {
            background: var(--titlebar-color);
            color: var(--titletext-color);
        }
    </style>
</head>
<body class="font-pixel h-screen flex flex-col p-2 md:p-8 overflow-hidden text-xl">

    <!-- Theme Switchers -->
    <div class="absolute top-2 right-4 flex gap-2 z-50">
        <button id="theme-pink" class="win-btn w-6 h-6 bg-[#fbcfe8] hover:bg-[#f9a8d4]" title="Pink Theme"></button>
        <button id="theme-green" class="win-btn w-6 h-6 bg-[#bbf7d0] hover:bg-[#86efac]" title="Green Theme"></button>
        <button id="theme-blue" class="win-btn w-6 h-6 bg-[#bfdbfe] hover:bg-[#93c5fd]" title="Blue Theme"></button>
        <button id="toggle-dark" class="ml-2 px-2 win-btn text-base" title="Toggle Dark Mode">🌙</button>
    </div>

    <!-- Login/Nickname Modal -->
    <div id="login-modal" class="fixed inset-0 bg-black bg-opacity-70 flex items-center justify-center z-40">
        <div class="win-border p-1 w-full max-w-sm mx-4">
            <div class="title-bar px-2 py-1 flex justify-between items-center font-bold text-lg">
                <span>Connect.exe</span>
                <button class="win-btn px-2 py-0 text-sm bg-gray-300 text-black">X</button>
            </div>
            <div class="p-6 flex flex-col gap-4 text-center">
                <p class="text-2xl">Welcome to WebChat 98</p>
                <div class="flex flex-col text-left">
                    <label for="nickname-input" class="mb-1">Nickname:</label>
                    <input type="text" id="nickname-input" class="win-border-inner px-2 py-1 focus:outline-none text-xl" placeholder="_" autocomplete="off">
                </div>
                <button id="join-btn" class="win-btn py-1 px-6 mx-auto mt-2 text-lg">Connect</button>
            </div>
        </div>
    </div>

    <!-- Main Chat UI (Hidden by default) -->
    <div id="chat-container" class="hidden flex-col h-full max-w-4xl mx-auto w-full win-border p-1 relative">
        <!-- Title Bar -->
        <header class="title-bar px-2 py-1 flex justify-between items-center font-bold select-none cursor-default text-lg sm:text-xl">
            <div class="flex items-center gap-2">
                <span class="text-yellow-300">💬</span>
                <span>Internet Chat Room v1.0</span>
            </div>
            <div class="flex gap-1">
                <button class="win-btn w-6 h-6 flex items-center justify-center text-sm font-bold bg-gray-300 text-black">_</button>
                <button class="win-btn w-6 h-6 flex items-center justify-center text-sm font-bold bg-gray-300 text-black">□</button>
                <button class="win-btn w-6 h-6 flex items-center justify-center text-sm font-bold bg-gray-300 text-black">X</button>
            </div>
        </header>

        <!-- Simulated Menu Bar -->
        <div class="flex gap-4 px-2 py-1 border-b-2 border-[var(--win-border-darker)] text-lg mb-1 bg-[var(--win-surface)] text-[var(--win-text)]">
            <span class="hover:bg-blue-600 hover:text-white cursor-pointer px-1">File</span>
            <span class="hover:bg-blue-600 hover:text-white cursor-pointer px-1">Edit</span>
            <span class="hover:bg-blue-600 hover:text-white cursor-pointer px-1">View</span>
            <span class="hover:bg-blue-600 hover:text-white cursor-pointer px-1">Options</span>
            <span class="hover:bg-blue-600 hover:text-white cursor-pointer px-1">Help</span>
        </div>
        
        <div class="px-2 py-1 text-lg bg-theme-bg border-2 border-[var(--win-border-darker)] mb-1 flex justify-between">
            <span>Status: Connected</span>
            <span>User: <span id="my-nickname-display" class="font-bold"></span></span>
        </div>

        <!-- Chat Box -->
        <div id="chat-box" class="flex-1 overflow-y-auto p-4 win-border-inner bg-[var(--bg-color)] space-y-4 mb-2">
            <!-- Messages will be injected here -->
        </div>

        <!-- Emoji Picker (Floating) -->
        <div id="emoji-picker" class="hidden absolute bottom-16 left-4 win-border p-2 grid grid-cols-5 gap-2 z-20">
            <!-- Emojis injected via JS -->
        </div>

        <!-- Input Area -->
        <footer class="flex items-center gap-2">
            <button id="emoji-btn" class="win-btn px-3 py-1 flex-shrink-0" title="Emoji">😊</button>
            <button id="location-btn" class="win-btn px-3 py-1 flex-shrink-0" title="Share Location">📍</button>
            <input type="text" id="message-input" class="flex-1 win-border-inner px-2 py-1 focus:outline-none text-xl" placeholder="Type message..." autocomplete="off">
            <button id="send-btn" class="win-btn px-6 py-1 flex-shrink-0 font-bold">Send</button>
        </footer>
    </div>

    <script src="/app.js"></script>
</body>
</html>
