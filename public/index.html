<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web-Based Multi-Client Chat</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <style>
        /* Custom scrollbar for chat box */
        #chat-box::-webkit-scrollbar {
            width: 6px;
        }
        #chat-box::-webkit-scrollbar-track {
            background: #f1f1f1; 
        }
        #chat-box::-webkit-scrollbar-thumb {
            background: #cbd5e1; 
            border-radius: 10px;
        }
        #chat-box::-webkit-scrollbar-thumb:hover {
            background: #94a3b8; 
        }
    </style>
</head>
<body class="bg-slate-100 h-screen flex flex-col font-sans overflow-hidden">

    <!-- Login/Nickname Modal -->
    <div id="login-modal" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 transition-opacity duration-300">
        <div class="bg-white rounded-xl shadow-2xl p-8 max-w-sm w-full mx-4 transform transition-transform scale-100">
            <h2 class="text-2xl font-bold text-center text-slate-800 mb-6">Welcome to Chat</h2>
            <div class="mb-4">
                <label for="nickname-input" class="block text-sm font-medium text-slate-700 mb-2">Choose a Nickname</label>
                <input type="text" id="nickname-input" class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none transition" placeholder="e.g., Akiru" autocomplete="off">
            </div>
            <button id="join-btn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2 px-4 rounded-lg transition duration-200 shadow-md">
                Join Chat
            </button>
        </div>
    </div>

    <!-- Main Chat UI (Hidden by default) -->
    <div id="chat-container" class="hidden flex-col h-full max-w-4xl mx-auto w-full bg-white shadow-xl relative overflow-hidden">
        <!-- Header -->
        <header class="bg-blue-600 text-white p-4 shadow-md sticky top-0 z-10 flex justify-between items-center">
            <div class="flex items-center gap-2">
                <span class="text-2xl">💬</span>
                <h1 class="text-xl font-bold tracking-wide">Web Chat Room</h1>
            </div>
            <span id="my-nickname-display" class="text-sm font-medium bg-blue-700 px-3 py-1 rounded-full shadow-inner"></span>
        </header>

        <!-- Chat Box -->
        <div id="chat-box" class="flex-1 overflow-y-auto p-4 space-y-4 bg-slate-50 scroll-smooth relative">
            <!-- Messages will be injected here -->
        </div>

        <!-- Emoji Picker (Floating) -->
        <div id="emoji-picker" class="hidden absolute bottom-20 left-4 bg-white border border-slate-200 shadow-lg rounded-xl p-3 grid grid-cols-5 gap-3 z-20 transform transition-all">
            <!-- Emojis will be injected here via JS -->
        </div>

        <!-- Input Area -->
        <footer class="bg-white p-3 sm:p-4 border-t border-slate-200 flex items-center gap-2 sticky bottom-0 z-10">
            <button id="emoji-btn" class="p-2 text-xl hover:bg-slate-100 rounded-full transition-colors flex-shrink-0" title="Emoji">
                😊
            </button>
            <button id="location-btn" class="p-2 text-xl hover:bg-slate-100 rounded-full text-blue-500 transition-colors flex-shrink-0" title="Share Location">
                📍
            </button>
            <input type="text" id="message-input" class="flex-1 px-4 py-2 bg-slate-100 border-transparent rounded-full focus:bg-white focus:ring-2 focus:ring-blue-500 focus:outline-none transition-all" placeholder="Type a message..." autocomplete="off">
            <button id="send-btn" class="bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2 px-6 rounded-full transition duration-200 flex-shrink-0 shadow-md transform hover:scale-105 active:scale-95">
                Send
            </button>
        </footer>
    </div>

    <script src="/app.js"></script>
</body>
</html>
